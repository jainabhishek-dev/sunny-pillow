# AI provider configuration for Sunny Pillow.
# Change provider + model + api_key_env to switch AI backends with no code changes.
# NOTE: Both providers must support vision (image input) for the current architecture.

# Supported providers: gemini | anthropic
provider: anthropic

# Gemini vision models: gemini-2.0-flash | gemini-2.5-flash (must support vision)
# Anthropic vision models: claude-sonnet-4-6 | claude-opus-4-7 (must support vision)
model: claude-haiku-4-5-20251001

# Name of the environment variable that holds the API key for the chosen provider.
api_key_env: ANTHROPIC_API_KEY

# Keep low for deterministic, rule-following output.
temperature: 0.1

# Maximum tokens in the AI response per vision call.
# Gemini 2.0/2.5 Flash supports up to 8192 output tokens.
max_tokens: 8192
