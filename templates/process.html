{% extends "base.html" %}

{% block title %}Processing - CheckPoint{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-3xl font-bold text-gray-900 mb-2">{{ title }}</h1>
  <p id="status-text" class="text-gray-600">Processing document...</p>
</div>

<!-- Cards container: one card per page with image + findings side-by-side -->
<div id="pages-container" class="space-y-4">
  <div class="border border-gray-200 rounded-lg bg-white p-4 shadow-sm text-center text-gray-500 py-8">
    <div class="animate-spin inline-block w-6 h-6 border-4 border-indigo-200 border-t-indigo-600 rounded-full mx-auto"></div>
    <p class="mt-2">Loading pages...</p>
  </div>
</div>

<!-- Footer with action button (shown on first finding) -->
<div id="footer" class="mt-6 hidden">
  <div class="flex items-center justify-between bg-gray-50 border border-gray-200 rounded-lg p-4">
    <div class="text-sm text-gray-600">
      <span id="findings-count">0</span> findings ·
      <span id="selected-count">0</span> selected
    </div>
    <div class="flex gap-2">
      <button
        id="retry-button"
        type="button"
        class="hidden px-4 py-2 bg-gray-600 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition"
      >
        Retry from page <span id="retry-page-num">0</span>
      </button>
      <button
        id="insert-button"
        type="button"
        class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
        disabled
      >
        Insert selected comments to Drive
      </button>
    </div>
  </div>
</div>

<!-- Error message display -->
<div id="error-message" class="hidden mt-6 border border-red-200 bg-red-50 rounded-lg p-4 text-red-800"></div>

<script>
const jobId = "{{ job_id }}";
const checkpointNames = {{ checkpoint_names | tojson }};
let pageFindings = {};  // {1: [...], 2: [...], ...}
let allFindingsFlat = [];  // flat list for counting
let selectedFindingIds = new Set();
let totalPages = 0;
let isPartialMode = false;

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function updateCounts() {
  document.getElementById('findings-count').textContent = allFindingsFlat.length;
  document.getElementById('selected-count').textContent = selectedFindingIds.size;

  // Enable insert button only if there are selected findings
  const insertButton = document.getElementById('insert-button');
  if (selectedFindingIds.size > 0) {
    insertButton.disabled = false;
  } else {
    insertButton.disabled = true;
  }
}

function createFindingElement(finding) {
  const div = document.createElement('div');
  div.className = 'border border-gray-200 rounded p-3 text-sm';
  div.innerHTML = `
    <div class="flex items-start gap-2">
      <input
        type="checkbox"
        class="mt-1 finding-checkbox"
        data-finding-id="${finding.id}"
        checked
      />
      <div class="flex-1">
        <div class="font-semibold text-gray-900">${escapeHtml(checkpointNames[finding.checkpoint_id] || finding.checkpoint_id)}</div>
        <div class="text-xs text-gray-500 mt-1">${escapeHtml(finding.location)}</div>
        <div class="text-gray-700 mt-2">
          <div class="font-mono bg-gray-100 px-2 py-1 rounded text-xs mb-2">"${escapeHtml(finding.quote)}"</div>
          <div><strong>Issue:</strong> ${escapeHtml(finding.issue)}</div>
          <div><strong>Suggestion:</strong> ${escapeHtml(finding.suggestion)}</div>
        </div>
      </div>
    </div>
  `;

  const checkbox = div.querySelector('.finding-checkbox');
  checkbox.addEventListener('change', (e) => {
    if (e.target.checked) {
      selectedFindingIds.add(finding.id);
    } else {
      selectedFindingIds.delete(finding.id);
    }
    updateCounts();
  });

  // Initially selected
  selectedFindingIds.add(finding.id);

  return div;
}

function createPageCard(page, totalPages) {
  const card = document.createElement('div');
  card.id = `page-card-${page}`;
  card.className = 'border border-gray-200 rounded-lg bg-white shadow-sm overflow-hidden';
  card.innerHTML = `
    <div class="flex relative">
      <!-- Image column (50%): in normal flow — determines card height -->
      <div class="w-1/2 bg-gray-100 p-4">
        <div class="relative">
          <img
            src="/job/${jobId}/page/${String(page).padStart(3, '0')}"
            alt="Page ${page}"
            class="w-full h-auto"
          />
          <div class="absolute top-2 right-2 bg-black bg-opacity-50 text-white px-2 py-1 rounded text-xs">
            ${page} / ${totalPages}
          </div>
        </div>
      </div>
      <!-- Findings column (50%): absolutely pinned to card height, scrolls independently -->
      <div class="absolute top-0 right-0 bottom-0 w-1/2 overflow-y-auto p-4 border-l border-gray-100">
        <div id="findings-${page}" class="space-y-3">
          <div class="text-center text-gray-500 py-4">
            <p class="text-sm">Processing page...</p>
          </div>
        </div>
      </div>
    </div>
  `;

  return card;
}

// Open EventSource to stream processing
const retryFrom = {{ retry_from|tojson }};
const streamUrl = retryFrom ? `/stream/${jobId}?retry_from=${retryFrom}` : `/stream/${jobId}`;
const eventSource = new EventSource(streamUrl);

eventSource.addEventListener('start', (event) => {
  const data = JSON.parse(event.data);
  totalPages = data.total_pages;
  pageFindings = {};
  allFindingsFlat = [];
  selectedFindingIds = new Set();
  isPartialMode = false;

  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  document.getElementById('error-message').classList.add('hidden');
  document.getElementById('retry-button').classList.add('hidden');

  if (totalPages > 100) {
    const warn = document.createElement('div');
    warn.className = 'mb-4 bg-amber-50 border border-amber-200 text-amber-800 rounded-lg px-4 py-3 text-sm';
    warn.textContent = `This document has ${totalPages} pages. Document-level checks support up to 100 pages for some providers — results may be partial.`;
    container.before(warn);
  }
});

eventSource.addEventListener('page_ready', (event) => {
  const data = JSON.parse(event.data);
  const { page, total_pages } = data;

  // Create page card with image + empty findings
  const card = createPageCard(page, total_pages);
  document.getElementById('pages-container').appendChild(card);
});

eventSource.addEventListener('page_findings', (event) => {
  const data = JSON.parse(event.data);
  const { page, findings } = data;

  // Show footer on first findings
  document.getElementById('footer').classList.remove('hidden');

  // Group findings by page
  pageFindings[page] = findings;

  // Add to flat list for counting
  for (const finding of findings) {
    allFindingsFlat.push(finding);
    selectedFindingIds.add(finding.id);
  }

  // Populate findings in the page card
  const findingsDiv = document.getElementById(`findings-${page}`);

  if (findings.length === 0) {
    findingsDiv.innerHTML = '<div class="text-center text-green-600 py-4"><p class="text-sm">✓ No errors found</p></div>';
  } else {
    findingsDiv.innerHTML = '';
    for (const finding of findings) {
      const findingElement = createFindingElement(finding);
      findingsDiv.appendChild(findingElement);
    }
  }

  updateCounts();
});

eventSource.addEventListener('page_review', (event) => {
  const data = JSON.parse(event.data);
  const { reviews } = data;

  for (const review of reviews) {
    const checkbox = document.querySelector(`[data-finding-id="${review.finding_id}"]`);
    if (!checkbox) continue;
    const findingDiv = checkbox.closest('.border');
    if (!findingDiv) continue;

    const isValid = review.verdict === 'valid';

    const badge = document.createElement('div');
    badge.className = 'mt-2 flex items-center gap-2';
    badge.innerHTML = `
      <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${isValid ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
        ${isValid ? '✓ Valid' : '✗ Invalid'}
      </span>
      <span class="text-xs text-gray-400">${escapeHtml(review.reason)}</span>
    `;
    findingDiv.querySelector('.flex-1').appendChild(badge);

    if (!isValid && checkbox.checked) {
      checkbox.checked = false;
      selectedFindingIds.delete(review.finding_id);
      updateCounts();
    }
  }
});

eventSource.addEventListener('done', (event) => {
  document.getElementById('status-text').textContent = 'Pages complete — checking document...';
});

eventSource.addEventListener('document_start', (event) => {
  const card = document.createElement('div');
  card.id = 'document-card';
  card.className = 'border border-purple-200 rounded-lg bg-white shadow-sm overflow-hidden';
  card.innerHTML = `
    <div class="px-4 py-3 bg-purple-50 border-b border-purple-100 flex items-center gap-2">
      <span class="text-sm font-semibold text-purple-700">Document-level findings</span>
      <span class="text-xs text-purple-400">Checking full document...</span>
    </div>
    <div id="document-findings" class="p-4">
      <div class="flex items-center gap-2 text-gray-500 text-sm">
        <div class="animate-spin w-4 h-4 border-2 border-purple-200 border-t-purple-600 rounded-full"></div>
        <span>Processing document...</span>
      </div>
    </div>
  `;
  document.getElementById('pages-container').appendChild(card);
});

eventSource.addEventListener('document_findings', (event) => {
  const data = JSON.parse(event.data);
  const { findings } = data;
  const findingsDiv = document.getElementById('document-findings');

  document.getElementById('footer').classList.remove('hidden');

  if (findings.length === 0) {
    findingsDiv.innerHTML = '<div class="text-center text-green-600 py-4 text-sm">✓ No document-level errors found</div>';
  } else {
    findingsDiv.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'space-y-3';
    for (const finding of findings) {
      allFindingsFlat.push(finding);
      selectedFindingIds.add(finding.id);
      list.appendChild(createFindingElement(finding));
    }
    findingsDiv.appendChild(list);
    updateCounts();
  }
});

eventSource.addEventListener('document_review', (event) => {
  const data = JSON.parse(event.data);
  const { reviews } = data;

  for (const review of reviews) {
    const checkbox = document.querySelector(`[data-finding-id="${review.finding_id}"]`);
    if (!checkbox) continue;
    const findingDiv = checkbox.closest('.border');
    if (!findingDiv) continue;

    const isValid = review.verdict === 'valid';
    const badge = document.createElement('div');
    badge.className = 'mt-2 flex items-center gap-2';
    badge.innerHTML = `
      <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${isValid ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
        ${isValid ? '✓ Valid' : '✗ Invalid'}
      </span>
      <span class="text-xs text-gray-400">${escapeHtml(review.reason)}</span>
    `;
    findingDiv.querySelector('.flex-1').appendChild(badge);

    if (!isValid && checkbox.checked) {
      checkbox.checked = false;
      selectedFindingIds.delete(review.finding_id);
      updateCounts();
    }
  }
});

eventSource.addEventListener('all_done', (event) => {
  const data = JSON.parse(event.data);
  const count = data.total_findings;
  document.getElementById('status-text').textContent =
    `Complete — ${count} finding${count !== 1 ? 's' : ''} found`;
  eventSource.close();
});

eventSource.addEventListener('partial_complete', (event) => {
  const data = JSON.parse(event.data);
  console.error('Processing failed:', data.error_message);

  isPartialMode = true;

  // Show error message
  const errorDiv = document.getElementById('error-message');
  errorDiv.innerHTML = `
    <strong>Error at page ${data.last_successful_page + 1}:</strong> ${escapeHtml(data.error_message)}<br/>
    <span class="text-sm">Findings from pages 1–${data.last_successful_page} are ready to insert.</span>
  `;
  errorDiv.classList.remove('hidden');

  // Show retry button
  const retryButton = document.getElementById('retry-button');
  const retryPageSpan = document.getElementById('retry-page-num');
  retryPageSpan.textContent = data.last_successful_page + 1;
  retryButton.classList.remove('hidden');

  // Enable insert button if there are findings
  updateCounts();
});

eventSource.addEventListener('retry_start', (event) => {
  const data = JSON.parse(event.data);
  console.log(`Resuming from page ${data.starting_page}...`);
  // Don't clear pageFindings or UI — just continue appending
  document.getElementById('error-message').classList.add('hidden');
  document.getElementById('retry-button').classList.add('hidden');
});

eventSource.addEventListener('error', (event) => {
  try {
    const data = JSON.parse(event.data);
    console.error('Stream error:', data.message);

    const errorDiv = document.getElementById('error-message');
    errorDiv.innerHTML = `
      <strong>Error:</strong> ${escapeHtml(data.message)}
    `;
    errorDiv.classList.remove('hidden');
  } catch (e) {
    console.error('EventSource error');
  }
});

// Retry button handler
document.getElementById('retry-button').addEventListener('click', async () => {
  const retryButton = document.getElementById('retry-button');
  retryButton.disabled = true;
  retryButton.textContent = 'Retrying...';

  try {
    const response = await fetch(`/retry-check/${jobId}`, {
      method: 'POST',
    });

    if (!response.ok) {
      alert('Retry failed');
      retryButton.disabled = false;
      retryButton.textContent = 'Retry from page';
      return;
    }

    // Redirect will happen automatically via 303
  } catch (error) {
    alert(`Error retrying: ${error.message}`);
    retryButton.disabled = false;
    retryButton.textContent = 'Retry from page';
  }
});

// Insert button handler
document.getElementById('insert-button').addEventListener('click', async () => {
  const button = document.getElementById('insert-button');
  button.disabled = true;
  button.textContent = 'Inserting...';

  const formData = new FormData();
  for (const id of selectedFindingIds) {
    formData.append('finding_ids', String(id));
  }

  try {
    const response = await fetch(`/insert-comments/${jobId}`, {
      method: 'POST',
      body: formData,
    });

    const result = await response.json();

    if (result.error) {
      alert(`Error: ${result.error}`);
    } else {
      alert(`Successfully inserted ${result.posted} comments to Drive!`);
      // Optionally redirect back to home
      // window.location.href = '/';
    }
  } catch (error) {
    alert(`Error inserting comments: ${error.message}`);
  } finally {
    button.disabled = false;
    button.textContent = 'Insert selected comments to Drive';
  }
});
</script>
{% endblock %}
