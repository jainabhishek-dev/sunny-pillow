<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sunny Pillow{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="bg-gray-50 min-h-screen text-gray-800">

  <!-- Navigation -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-2">
      <span class="text-xl font-bold text-indigo-700">☀️ Sunny Pillow</span>
      <span class="text-xs text-gray-400 ml-2">House Style Checker</span>
    </div>
    {% if user %}
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        {% if user.picture %}
        <img src="{{ user.picture }}" alt="avatar" class="w-8 h-8 rounded-full" referrerpolicy="no-referrer" />
        {% endif %}
        <span class="text-sm text-gray-600">{{ user.name or user.email }}</span>
      </div>
      <a href="/logout" class="text-sm text-gray-400 hover:text-red-500 transition">Sign out</a>
    </div>
    {% endif %}
  </nav>

  <!-- Page content -->
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>

</html>
